<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort-Generator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      padding: 35px;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
    }

    .password-box {
      background: white;
      color: #222;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      margin-bottom: 20px;
      word-break: break-all;
      min-height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 16px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a843;
      transform: scale(1.03);
    }

    .copy-button {
      margin-top: 12px;
      background: #ff9800;
    }

    .copy-button:hover {
      background: #e68900;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Passwort-Generator</h1>
    <p>Generieren Sie hier ihr eigenes neues Passwort, kostenlos!</p>

    <div id="password" class="password-box">Ihr Passwort erscheint hier</div>

    <label for="length">Passwortlänge</label>
    <input type="number" id="length" value="12" min="6" max="40">

    <button onclick="generatePassword()">Passwort generieren</button>
    <button class="copy-button" onclick="copyPassword()">Passwort kopieren</button>
  </div>

  <script>
    function generatePassword() {
      const length = document.getElementById("length").value;
      const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*?";
      let password = "";

      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * characters.length);
        password += characters[randomIndex];
      }

      document.getElementById("password").textContent = password;
    }

    function copyPassword() {
      const password = document.getElementById("password").textContent;

      if (password === "Ihr Passwort erscheint hier") {
        alert("Bitte zuerst ein Passwort generieren.");
        return;
      }

      navigator.clipboard.writeText(password);
      alert("Passwort wurde kopiert.");
    }
  </script>
</body>
</html>
