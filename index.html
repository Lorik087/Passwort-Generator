<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generieren Sie hier ihr eigenes neues Passwort, kostenlos!">
  <title>Passwort-Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1e293b;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      max-width: 420px;
      width: 100%;
      padding: 2rem;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      color: #0f172a;
    }

    label {
      display: block;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    input[type="number"], .output {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      background: #f8fafc;
      box-sizing: border-box;
    }

    .checkbox-group {
      display: grid;
      gap: 0.75rem;
      margin: 1rem 0 1.5rem;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      font-weight: 500;
      margin: 0;
    }

    .checkbox-group input {
      margin-right: 0.7rem;
      accent-color: #2563eb;
    }

    .button-row {
      display: grid;
      gap: 0.75rem;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .generate {
      background: #2563eb;
      color: #ffffff;
    }

    .copy {
      background: #e2e8f0;
      color: #1f2937;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Passwort-Generator</h1>
    <p style="margin-top:0.4rem; color:#475569; line-height:1.6;">Generieren Sie hier ihr eigenes neues Passwort, kostenlos!</p>
    <label for="length">Länge</label>
    <input id="length" type="number" min="4" max="64" value="16">

    <div class="checkbox-group">
      <label><input id="useUpper" type="checkbox" checked>Großbuchstaben (A-Z)</label>
      <label><input id="useLower" type="checkbox" checked>Kleinbuchstaben (a-z)</label>
      <label><input id="useNumbers" type="checkbox" checked>Zahlen (0-9)</label>
      <label><input id="useSymbols" type="checkbox" checked>Symbole (!@#$...)</label>
    </div>

    <div class="button-row">
      <button class="generate" id="generateBtn">Passwort generieren</button>
      <button class="copy" id="copyBtn" type="button">Kopieren</button>
    </div>

    <label for="output" style="margin-top:1rem;">Generiertes Passwort</label>
    <input id="output" class="output" type="text" readonly placeholder="Hier erscheint dein Passwort">

    <p class="footer">Wähle die Optionen, klicke auf "Passwort generieren" und kopiere das Ergebnis.</p>
  </div>

  <script>
    const lengthInput = document.getElementById('length');
    const useUpper = document.getElementById('useUpper');
    const useLower = document.getElementById('useLower');
    const useNumbers = document.getElementById('useNumbers');
    const useSymbols = document.getElementById('useSymbols');
    const output = document.getElementById('output');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');

    const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowerChars = 'abcdefghijklmnopqrstuvwxyz';
    const numberChars = '0123456789';
    const symbolChars = '!@#$%^&*()-_=+[]{};:,.<>?';

    function generatePassword() {
      const length = Math.max(4, Math.min(64, Number(lengthInput.value) || 16));
      let chars = '';
      if (useUpper.checked) chars += upperChars;
      if (useLower.checked) chars += lowerChars;
      if (useNumbers.checked) chars += numberChars;
      if (useSymbols.checked) chars += symbolChars;
      if (!chars) {
        alert('Bitte wähle mindestens eine Zeichenart aus.');
        return '';
      }

      let password = '';
      for (let i = 0; i < length; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }
      return password;
    }

    generateBtn.addEventListener('click', () => {
      output.value = generatePassword();
    });

    copyBtn.addEventListener('click', async () => {
      if (!output.value) return;
      try {
        await navigator.clipboard.writeText(output.value);
        copyBtn.textContent = 'Kopiert!';
        setTimeout(() => { copyBtn.textContent = 'Kopieren'; }, 1500);
      } catch (err) {
        alert('Kopieren fehlgeschlagen. Bitte manuell kopieren.');
      }
    });
  </script>
</body>
</html>
